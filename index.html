<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The King's Cup — Official Support</title>
    <style>
        :root {
            --bg-color: #0F0F12;
            --card-bg: #1A1A22;
            --primary-gold: #D4AF37;
            --primary-gold-hover: #B8860B;
            --text-main: #FFFFFF;
            --text-muted: #A0A0AB;
            --border-color: #2A2A38;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            padding: 60px 40px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 32px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: var(--primary-gold);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 500px;
            margin: 0 auto 48px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .link-btn {
            display: inline-block;
            background-color: var(--primary-gold);
            color: #000;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 240px;
            font-size: 1.1rem;
        }

        .link-btn:hover {
            background-color: var(--primary-gold-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(212, 175, 55, 0.3);
        }

        .link-btn.secondary {
            background-color: transparent;
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
        }

        .link-btn.secondary:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        footer {
            margin-top: 80px;
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="resources/icon-1024.png" alt="The King's Cup Icon" class="app-icon">
        <h1>The King's Cup</h1>
        <div class="subtitle">Official Support</div>
        <p>The ultimate social card game for parties, tailored for a premium experience.</p>

        <div class="links">
            <a href="support.html" class="link-btn">Contact Support</a>
            <a href="privacy-policy.html" class="link-btn secondary">Privacy Policy</a>
        </div>
    </div>

    <footer>
        &copy; 2026 The King's Cup. All rights reserved.
    </footer>
</body>
</html>
